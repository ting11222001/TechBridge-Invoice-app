@if (homeState$ | async; as state) {
   <ng-container>
      <ng-container>
         <app-stats [stats]="state?.appData?.data?.stats"></app-stats>
         <section>
               <div class="container">
                  <div class="row mt-3">
                     <div class="col">
                        <h4 class="fw-bold text-start">Customers</h4>
                     </div>
                     <div class="col">
                        <h4 class="fw-bold text-end"><i style="cursor: pointer;color: green;font-size: 30px;" class="bi bi-file-earmark-excel"></i></h4>
                     </div>
                     
                     <!-- Customers Table -->
                     <div class="overflow-x-auto rounded-xl border border-white/10 bg-[#0f172a]">
                        <table class="w-full text-sm text-slate-300">
                           <thead>
                              <tr class="border-b border-white/10 text-xs uppercase tracking-wider text-slate-500">
                              <th class="px-4 py-3 text-left font-medium">Name</th>
                              <th class="px-4 py-3 text-left font-medium">Phone</th>
                              <th class="px-4 py-3 text-left font-medium">Status</th>
                              <th class="px-4 py-3 text-left font-medium">Type</th>
                              <th class="px-4 py-3 text-left font-medium">Action</th>
                              </tr>
                           </thead>
                           <tbody class="divide-y divide-white/5">
                              <tr
                              *ngFor="let customer of state?.appData?.data?.page?.content"
                              class="transition-colors hover:bg-white/5"
                              >
                              <!-- Name + Email stacked with avatar -->
                              <td class="px-4 py-3">
                                 <div class="flex items-center gap-3">
                                    <img
                                    [src]="customer.imageUrl"
                                    [alt]="customer.name"
                                    width="40" height="40"
                                    class="h-10 w-10 rounded-full object-cover ring-1 ring-white/10"
                                    />
                                    <div>
                                    <p class="font-medium text-white">{{ customer.name }}</p>
                                    <p class="text-xs text-slate-500">{{ customer.email }}</p>
                                    </div>
                                 </div>
                              </td>

                              <td class="px-4 py-3 text-slate-400">{{ customer.phone }}</td>

                              <!-- Status badge -->
                              <td class="px-4 py-3">
                                 <span
                                    class="inline-flex items-center rounded-full border border-emerald-500/30 bg-emerald-500/10 px-2.5 py-0.5 text-xs font-medium text-emerald-400"
                                 >
                                    {{ customer.status }}
                                 </span>
                              </td>

                              <td class="px-4 py-3 text-slate-400">{{ customer.type }}</td>

                              <td class="px-4 py-3">
                                 <button
                                    type="button"
                                    (click)="selectedCustomer(customer)"
                                    class="text-sm font-medium text-indigo-400 transition-colors hover:text-indigo-300"
                                 >
                                    View
                                 </button>
                              </td>
                              </tr>
                           </tbody>
                        </table>

                        <!-- Pagination -->
                        @if ((state?.appData?.data?.page?.content?.length ?? 0) > 0) {
                           <div class="flex items-center justify-end gap-1 border-t border-white/10 px-4 py-3">
                              <button
                              (click)="goToNextOrPreviousPage('backward')"
                              [disabled]="currentPage() === 0"
                              class="rounded-md px-3 py-1.5 text-xs text-slate-400 transition-colors hover:bg-white/5 disabled:cursor-not-allowed disabled:opacity-30"
                              >
                              ← Prev
                              </button>

                              <button
                              *ngFor="let pageNumber of [].constructor(state?.appData?.data?.page?.totalPages); let i = index"
                              (click)="goToPage(i)"
                              [class]="i === currentPage()
                                 ? 'rounded-md px-3 py-1.5 text-xs bg-indigo-500/20 text-indigo-400 font-medium'
                                 : 'rounded-md px-3 py-1.5 text-xs text-slate-400 hover:bg-white/5 transition-colors'"
                              >
                              {{ i + 1 }}
                              </button>

                              <button
                              (click)="goToNextOrPreviousPage('forward')"
                              [disabled]="((state?.appData?.data?.page?.totalPages ?? 0) - 1) === currentPage()"
                              class="rounded-md px-3 py-1.5 text-xs text-slate-400 transition-colors hover:bg-white/5 disabled:cursor-not-allowed disabled:opacity-30"
                              >
                              Next →
                              </button>
                           </div>
                        }
                        </div>
                  
               </div>
            </div>
         </section>
      </ng-container>
   </ng-container>
}
