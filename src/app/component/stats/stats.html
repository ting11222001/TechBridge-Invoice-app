<section class="mt-4 px-4">
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

    <!-- Total Customers -->
    <div class="bg-[#1a2236] border border-[#2a3450] rounded-xl p-6 flex flex-col gap-2">
      <div class="flex items-center gap-2 text-slate-400 text-sm">
        <i class="bi bi-people-fill text-blue-400"></i>
        Total Customers
      </div>
      <p class="text-white text-3xl font-bold tracking-tight">{{ stats?.totalCustomers }}</p>
    </div>

    <!-- Total Invoices -->
    <div class="bg-[#1a2236] border border-[#2a3450] rounded-xl p-6 flex flex-col gap-2">
      <div class="flex items-center gap-2 text-slate-400 text-sm">
        <i class="bi bi-receipt-cutoff text-emerald-400"></i>
        Total Invoices
      </div>
      <p class="text-white text-3xl font-bold tracking-tight">{{ stats?.totalInvoices }}</p>
    </div>

    <!-- Total Billed -->
    <div class="bg-[#1a2236] border border-[#2a3450] rounded-xl p-6 flex flex-col gap-2">
      <div class="flex items-center gap-2 text-slate-400 text-sm">
        <i class="bi bi-currency-dollar text-violet-400"></i>
        Total Billed
      </div>
      <p class="text-white text-3xl font-bold tracking-tight">${{ stats?.totalBilled }}</p>
    </div>

  </div>
</section>
